name: Elixir CI

on:
  push:
  pull_request:
    branches: [ main ]

env:
  MIX_ENV: test

jobs:
  deps:
    name: Install Dependencies
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pair:
          - elixir: '1.15'
            otp: '26'
          - elixir: '1.19.5'
            otp: '28'
    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: setup
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ matrix.pair.elixir }}
        otp-version: ${{ matrix.pair.otp }}
    - name: Retrieve Cached Dependencies
      uses: actions/cache@v4
      id: mix-cache
      with:
        path: |
          deps
          _build
          priv/plts
        key: ${{ runner.os }}-${{ matrix.pair.otp }}-${{ matrix.pair.elixir }}-${{ hashFiles('mix.lock') }}
    - name: Install deps
      if: steps.mix-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p priv/plts
        mix local.rebar --force
        mix local.hex --force
        mix deps.get
        mix deps.compile
        mix dialyzer --plt

  analyze:
    name: Analysis
    needs: deps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pair:
          - elixir: '1.15'
            otp: '26'
          - elixir: '1.19.5'
            otp: '28'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ matrix.pair.elixir }}
        otp-version: ${{ matrix.pair.otp }}
    - name: Retrieve Cached Dependencies
      uses: actions/cache@v4
      id: mix-cache
      with:
        path: |
          deps
          _build
          priv/plts
        key: ${{ runner.os }}-${{ matrix.pair.otp }}-${{ matrix.pair.elixir }}-${{ hashFiles('mix.lock') }}
    - name: Run Credo
      run: mix credo
    - name: Run Dialyzer
      run: mix dialyzer --no-check --halt-exit-status

  tests:
    name: Tests
    needs: deps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pair:
          - elixir: '1.15'
            otp: '26'
          - elixir: '1.19.5'
            otp: '28'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ matrix.pair.elixir }}
        otp-version: ${{ matrix.pair.otp }}
    - name: Retrieve Cached Dependencies
      uses: actions/cache@v4
      id: mix-cache
      with:
        path: |
          deps
          _build
          priv/plts
        key: ${{ runner.os }}-${{ matrix.pair.otp }}-${{ matrix.pair.elixir }}-${{ hashFiles('mix.lock') }}
    - name: Run Tests
      run: mix test
